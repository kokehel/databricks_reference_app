parameters:
  - name: stageName
    type: string
  - name: displayName
    type: string
  - name: dependsOn
    type: object
    default: []
  - name: azureSubscription
    type: string
  - name: environmentName
    type: string
  - name: variableGroup
    type: string
  - name: workingDirectory
    type: string
    default: app_project_V1
  - name: startIfNeeded
    type: boolean
    default: true

- stage: ${{ parameters.stageName }}
  displayName: ${{ parameters.displayName }}
  dependsOn: ${{ parameters.dependsOn }}
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/release'),
      not(eq(variables['Build.Reason'], 'PullRequest'))
    )
  variables:
    - group: ${{ parameters.variableGroup }}
  jobs:
    - deployment: deployDatabricksApp
      displayName: ${{ parameters.displayName }}
      environment: ${{ parameters.environmentName }}
      pool:
        vmImage: ubuntu-latest
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
                displayName: Checkout source
                persistCredentials: true
                fetchDepth: "0"
                clean: true

              - script: |
                  set -e
                  sed -i 's/\r$//' install_databricks_cli.sh
                  sed -i 's/\r$//' deploy_databricks_app.sh
                  sh install_databricks_cli.sh
                workingDirectory: .azure/devops-pipelines
                displayName: Install Databricks CLI

              - task: AzureCLI@2
                displayName: Deploy Databricks App
                inputs:
                  azureSubscription: ${{ parameters.azureSubscription }}
                  addSpnToEnvironment: true
                  scriptType: bash
                  scriptLocation: inlineScript
                  workingDirectory: ${{ parameters.workingDirectory }}
                  inlineScript: |
                    set -euo pipefail

                    export ARM_TENANT_ID="$tenantId"
                    export ARM_CLIENT_ID="$servicePrincipalId"
                    export ARM_CLIENT_SECRET="$servicePrincipalKey"

                    : "${DATABRICKS_HOST:?Set DATABRICKS_HOST in the variable group.}"
                    : "${DATABRICKS_WAREHOUSE_ID:?Set DATABRICKS_WAREHOUSE_ID in the variable group.}"
                    : "${APP_NAME:?Set APP_NAME in the variable group.}"
                    : "${APP_ENV:?Set APP_ENV in the variable group.}"

                    DEPLOY_SOURCE_PATH="${DEPLOY_SOURCE_PATH:-/Workspace/Users/$servicePrincipalId/databricks_apps/$APP_NAME}"

                    bash ../.azure/devops-pipelines/deploy_databricks_app.sh \
                      "$APP_NAME" \
                      "$DEPLOY_SOURCE_PATH" \
                      "${{ lower(parameters.startIfNeeded) }}"
