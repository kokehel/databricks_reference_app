trigger:
  batch: true
  branches:
    include:
      - main
      - release

# Customer-specific values live in Azure DevOps variable groups, not source.
# Required variable group values:
# - DATABRICKS_HOST
# - DATABRICKS_WAREHOUSE_ID
# - APP_NAME
# - APP_DISPLAY_NAME
# - APP_ENV
# - CATALOG_NAME or CATALOG_PREFIX
# - DEFAULT_SCHEMA
# - Optional: DEPLOY_SOURCE_PATH

parameters:
  - name: deployStages
    type: object
    default:
      - stageName: devBundleCD
        displayName: Deploy Databricks app to dev
        dependsOn: []
        azureSubscription: replace-with-dev-service-connection
        environmentName: databricks-dev
        variableGroup: databricks-app-dev
        startIfNeeded: true
      - stageName: uatBundleCD
        displayName: Deploy Databricks app to uat
        dependsOn:
          - devBundleCD
        azureSubscription: replace-with-uat-service-connection
        environmentName: databricks-uat
        variableGroup: databricks-app-uat
        startIfNeeded: true
      - stageName: prdBundleCD
        displayName: Deploy Databricks app to prd
        dependsOn:
          - uatBundleCD
        azureSubscription: replace-with-prd-service-connection
        environmentName: databricks-prd
        variableGroup: databricks-app-prd
        startIfNeeded: false

stages:
  - ${{ each deployStage in parameters.deployStages }}:
      - template: templates/deploy-databricks-app-stage.yml
        parameters:
          stageName: ${{ deployStage.stageName }}
          displayName: ${{ deployStage.displayName }}
          dependsOn: ${{ deployStage.dependsOn }}
          azureSubscription: ${{ deployStage.azureSubscription }}
          environmentName: ${{ deployStage.environmentName }}
          variableGroup: ${{ deployStage.variableGroup }}
          startIfNeeded: ${{ deployStage.startIfNeeded }}
